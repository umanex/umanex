name: Sync Design Tokens

on:
  push:
    paths:
      - 'tokens/tokens.json'
    branches:
      - main

jobs:
  build-tokens:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - run: npm run tokens:build

      - name: Commit generated constants
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add constants/
          git diff --staged --quiet || git commit -m "chore: regenerate constants from tokens.json"
          git push
